<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Swish - Final</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { margin: 0; padding: 0; background-color: #050505; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; filter: blur(0px); transition: filter 0.5s; }
        
        #ui-layer {
            position: absolute; top: 30px; right: 30px;
            pointer-events: none; text-align: right;
            z-index: 5;
        }
        #score-display {
            color: #fff; font-size: 3.5rem; font-weight: 900;
            text-shadow: 0 0 20px #00f2ff; margin-bottom: 0;
        }
        #feedback-container { position: relative; height: 120px; width: 250px; }
        .feedback-text {
            position: absolute; right: 0; font-size: 2.2rem; font-weight: 900;
            text-transform: uppercase; animation: slideUpFade 1.2s ease-out forwards;
        }
        @keyframes slideUpFade {
            0% { transform: translateY(30px); opacity: 0; }
            15% { transform: translateY(0); opacity: 1; }
            85% { transform: translateY(-20px); opacity: 1; }
            100% { transform: translateY(-40px); opacity: 0; filter: blur(10px); }
        }

        /* Game Over Screen */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; text-align: center; color: #fff;
            padding: 20px;
            backdrop-filter: blur(10px);
        }
        #overlay h1 { font-size: 2.5rem; margin: 0; color: #ff0044; text-shadow: 0 0 20px #ff0044; }
        #overlay p { font-size: 1rem; color: #00f2ff; margin: 10px 0 20px 0; letter-spacing: 2px; }
        
        .stat-box { margin-bottom: 30px; }
        .stat-label { font-size: 0.75rem; text-transform: uppercase; opacity: 0.7; letter-spacing: 3px; display: block; margin-top: 15px; }
        .stat-value { font-size: 3.5rem; font-weight: 900; line-height: 1; margin: 5px 0; }
        #high-score-val { color: #ffff00; text-shadow: 0 0 15px #ffff00; }
        
        #restart-btn {
            padding: 12px 35px; font-family: 'Orbitron', sans-serif;
            background: transparent; border: 2px solid #00f2ff;
            color: #00f2ff; font-size: 1.1rem; cursor: pointer;
            text-transform: uppercase; letter-spacing: 4px;
            transition: 0.3s; box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            animation: btnPulse 2s infinite;
            outline: none;
        }
        #restart-btn:hover { background: #00f2ff; color: #000; box-shadow: 0 0 30px #00f2ff; }

        #start-prompt {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00f2ff; font-size: 1.1rem; text-transform: uppercase;
            letter-spacing: 6px; text-align: center; opacity: 0.8;
            pointer-events: none;
        }

        @keyframes btnPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 0 25px #00f2ff; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div id="score-display">0</div>
        <div id="feedback-container"></div>
    </div>

    <div id="start-prompt">TAP TO SWISH</div>

    <div id="overlay">
        <p>BETTER LUCK NEXT TIME</p>
        <h1>GAME OVER</h1>
        <div class="stat-box">
            <span class="stat-label">Score</span>
            <span id="current-score-val" class="stat-value">0</span>
            <span class="stat-label">Best</span>
            <span id="high-score-val" class="stat-value">0</span>
        </div>
        <button id="restart-btn">PLAY AGAIN</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score-display');
        const feedbackContainer = document.getElementById('feedback-container');
        const startPrompt = document.getElementById('start-prompt');
        const overlay = document.getElementById('overlay');
        const currentScoreVal = document.getElementById('current-score-val');
        const highScoreVal = document.getElementById('high-score-val');
        const restartBtn = document.getElementById('restart-btn');

        let width, height, player, score = 0, highScore = 0;
        let isGameRunning = false;
        let isDead = false;
        let hoops = [], particles = [], dustParticles = [];
        let framesSinceLastHoop = 0;
        const GAME_SPEED = 5.2;

        // Load high score
        const savedScore = localStorage.getItem('neonSwishHighScore');
        if (savedScore) highScore = parseInt(savedScore);

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                const ang = Math.random() * Math.PI * 2;
                const speed = Math.random() * 5 + 2;
                this.vx = Math.cos(ang) * speed;
                this.vy = Math.sin(ang) * speed;
                this.life = 1.0;
                this.color = color;
                this.size = Math.random() * 3 + 1;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.vy += 0.1;
                this.life -= 0.025;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function showFeedback(text, color) {
            const div = document.createElement('div');
            div.className = 'feedback-text';
            div.innerText = text;
            div.style.color = color;
            div.style.textShadow = `0 0 20px ${color}`;
            feedbackContainer.appendChild(div);
            setTimeout(() => div.remove(), 1200);
        }

        class Dust {
            constructor() { this.reset(); this.x = Math.random() * width; }
            reset() {
                this.x = width + 20; this.y = Math.random() * height;
                this.size = Math.random() * 1.2;
                this.speed = (Math.random() * 2) + 1;
            }
            update() { this.x -= this.speed; if (this.x < -10) this.reset(); }
            draw() {
                ctx.fillStyle = "rgba(0, 242, 255, 0.15)";
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        class Hoop {
            constructor() {
                this.radius = Math.min(width, height) * 0.11;
                if(this.radius < 75) this.radius = 75;
                const margin = height * 0.25;
                this.y = margin + Math.random() * (height - 2 * margin);
                this.x = width + this.radius;
                const angles = [-30, -15, 0, 15, 30]; 
                this.angle = angles[Math.floor(Math.random() * angles.length)];
                this.color = '#00f2ff';
                this.passed = false;
                this.touchedRim = false;
                this.scored = false;
            }

            getRimPoints() {
                const rad = this.angle * Math.PI / 180;
                const dx = Math.cos(rad) * this.radius;
                const dy = Math.sin(rad) * this.radius;
                return [
                    { x: this.x - dx, y: this.y - dy },
                    { x: this.x + dx, y: this.y + dy }
                ];
            }

            update() {
                if (isDead) return;
                this.x -= GAME_SPEED;
                
                const rims = this.getRimPoints();
                rims.forEach(rim => {
                    const dx = player.x - rim.x;
                    const dy = player.y - rim.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const minDist = player.radius + 8;
                    
                    if (dist < minDist) {
                        this.touchedRim = true;
                        const normalX = dx / dist;
                        const normalY = dy / dist;
                        const overlap = minDist - dist;
                        player.x += normalX * overlap;
                        player.y += normalY * overlap;
                        const dot = player.vx * normalX + player.vy * normalY;
                        player.vx = (player.vx - 1.1 * dot * normalX) * 0.3;
                        player.vy = (player.vy - 1.1 * dot * normalY) * 0.3;
                        player.vy += 0.3;
                    }
                });

                if (!this.scored) {
                    if (player.x > this.x - this.radius && player.x < this.x + this.radius) {
                        const prevY = player.y - player.vy; 
                        if (prevY <= this.y && player.y >= this.y) {
                            const horizontalDist = Math.abs(player.x - this.x);
                            if (horizontalDist < this.radius * 0.9) {
                                this.scored = true;
                                this.triggerScore();
                            }
                        }
                    }
                }

                if (!this.scored && !this.passed) {
                    if (this.x < player.x - this.radius * 1.5) {
                        this.passed = true;
                        score = Math.max(0, score - 1);
                        showFeedback("-1 MISS", "#ff0044");
                        scoreDisplay.innerText = score;
                    }
                }
            }

            triggerScore() {
                if (this.touchedRim) {
                    score += 2;
                    showFeedback("+2 RIM", "#00f2ff");
                    for(let i=0; i<12; i++) particles.push(new Particle(player.x, player.y, "#00f2ff"));
                } else {
                    score += 4;
                    showFeedback("+4 SWISH!", "#ffff00");
                    for(let i=0; i<35; i++) particles.push(new Particle(this.x, this.y, "#ffff00"));
                }
                scoreDisplay.innerText = score;
            }

            draw(part) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle * Math.PI / 180);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 14;
                ctx.shadowBlur = 25; ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.ellipse(0, 0, this.radius, this.radius * 0.35, 0, 
                    part === 'back' ? Math.PI : 0, 
                    part === 'back' ? Math.PI * 2 : Math.PI);
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = "rgba(255,255,255,0.6)";
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.restore();
            }
        }

        class Ball {
            constructor() {
                this.radius = 21;
                this.reset();
            }
            reset() {
                this.x = width * 0.25;
                this.y = height / 2;
                this.vy = 0; this.vx = 0;
                this.gravity = 0.5;
                this.lift = -10;
                this.trail = [];
            }
            flap() { 
                if (isDead) return;
                this.vy = this.lift; 
                if(!isGameRunning) {
                    isGameRunning = true; 
                    startPrompt.style.display = 'none'; 
                }
            }
            update() {
                if (!isGameRunning || isDead) { 
                    if (!isDead) this.y = (height/2) + Math.sin(Date.now()/300)*15; 
                    return; 
                }
                this.vy += this.gravity;
                this.y += this.vy;
                this.x += this.vx;
                this.vx += (width * 0.25 - this.x) * 0.04;
                this.vx *= 0.94;

                this.trail.push({x: this.x, y: this.y});
                if(this.trail.length > 15) this.trail.shift();

                if (this.y < this.radius) { this.y = this.radius; this.vy = 0; }
                if (this.y > height + 50) { this.triggerGameOver(); }
            }
            triggerGameOver() {
                isDead = true;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('neonSwishHighScore', highScore);
                }
                currentScoreVal.innerText = score;
                highScoreVal.innerText = highScore;
                overlay.style.display = 'flex';
                canvas.style.filter = 'blur(10px)';
            }
            draw() {
                this.trail.forEach((p, i) => {
                    const alpha = i / this.trail.length;
                    ctx.fillStyle = `rgba(255, 140, 0, ${alpha * 0.4})`;
                    ctx.beginPath(); ctx.arc(p.x, p.y, this.radius * (0.4 + alpha * 0.6), 0, Math.PI*2); ctx.fill();
                });
                ctx.shadowBlur = 30; ctx.shadowColor = "#ff8c00";
                ctx.fillStyle = "#ff8c00";
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = "rgba(255,255,255,0.85)";
                ctx.beginPath(); ctx.arc(this.x - 7, this.y - 7, 6, 0, Math.PI*2); ctx.fill();
            }
        }

        player = new Ball();
        for(let i=0; i<60; i++) dustParticles.push(new Dust());

        function gameLoop() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, width, height);
            dustParticles.forEach(d => { d.update(); d.draw(); });

            if(isGameRunning && !isDead) {
                framesSinceLastHoop++;
                const spawnRate = Math.max(105, width / (GAME_SPEED * 1.15));
                if(framesSinceLastHoop > spawnRate) {
                    hoops.push(new Hoop());
                    framesSinceLastHoop = 0;
                }
            }

            hoops.forEach(h => { h.update(); h.draw('back'); });
            player.update();
            player.draw();
            hoops.forEach(h => h.draw('front'));
            
            particles.forEach((p, i) => {
                p.update(); p.draw();
                if(p.life <= 0) particles.splice(i, 1);
            });

            requestAnimationFrame(gameLoop);
        }

        function restartGame() {
            score = 0;
            scoreDisplay.innerText = "0";
            hoops = [];
            particles = [];
            isDead = false;
            isGameRunning = false;
            player.reset();
            overlay.style.display = 'none';
            startPrompt.style.display = 'block';
            canvas.style.filter = 'blur(0px)';
            feedbackContainer.innerHTML = '';
        }

        const handle = (e) => { 
            if (isDead) return;
            if(e.code === 'Space' || e.type === 'mousedown' || e.type === 'touchstart') {
                if(e.type === 'touchstart') e.preventDefault();
                player.flap(); 
            }
        };
        
        window.addEventListener('mousedown', handle);
        window.addEventListener('keydown', handle);
        window.addEventListener('touchstart', handle, {passive: false});
        restartBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            restartGame();
        });

        gameLoop();
    </script>
</body>
</html>
